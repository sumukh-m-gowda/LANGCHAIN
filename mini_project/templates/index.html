<!DOCTYPE html>
<html>
<head>
    <title>My AI Chatbot</title>
</head>
<body>

    <h1>Ask Gemini AI</h1>

    <form method="POST">
        <input
            type="text"
            name="question"
            placeholder="Ask anything..."
            style="width:300px;"
            required
        >

        <button type="submit">
            Ask AI
        </button>
    </form>

    <br>

    <h3>Response:</h3>

    <p>{{ answer }}</p>

</body>
</html>
